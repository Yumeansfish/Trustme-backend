name: Backend Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dashboard-tests:
    if: github.repository == 'Yumeansfish/Trustme-backend'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Poetry
        run: python -m pip install poetry==1.8.3

      - name: Run backend dashboard hard-test lane
        run: make test-dashboard

      - name: Check dependency lock/config consistency
        run: ./scripts/tests/check_dependency_locks.sh
